<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#4f46e5',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom scrollbar and selection */
        ::selection {
            background-color: #818cf8;
            color: white;
        }

        /* Glassmorphism effects */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body
    class="bg-slate-900 min-h-screen flex items-center justify-center p-4 antialiased text-slate-200 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black">

    <div
        class="glass w-full max-w-md rounded-3xl shadow-2xl p-8 relative overflow-hidden transition-all duration-300 hover:shadow-primary/20 hover:shadow-2xl">
        <!-- Decorative blobs -->
        <div
            class="absolute top-0 right-0 -mr-16 -mt-16 w-32 h-32 rounded-full bg-primary/20 blur-3xl pointer-events-none">
        </div>
        <div
            class="absolute bottom-0 left-0 -ml-16 -mb-16 w-32 h-32 rounded-full bg-indigo-500/20 blur-3xl pointer-events-none">
        </div>

        <div class="relative z-10">
            <h2 class="text-3xl font-bold text-white mb-2 tracking-tight">Convert Currency</h2>
            <p class="text-slate-400 text-sm mb-8 font-medium">Fast and secure exchange rates</p>

            <div class="space-y-6">
                <!-- USD Input -->
                <div class="group">
                    <label for="usd-input"
                        class="block text-xs font-semibold tracking-wide text-slate-400 uppercase mb-2 ml-1 group-focus-within:text-primary transition-colors">You
                        Send (USD)</label>
                    <div class="relative flex items-center">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-slate-400 font-semibold sm:text-lg">$</span>
                        </div>
                        <input type="number" id="usd-input"
                            class="block w-full pl-10 pr-16 py-4 bg-slate-800/50 border border-slate-700/50 rounded-2xl text-white font-medium text-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all duration-300 placeholder-slate-500 outline-none hover:border-slate-600"
                            placeholder="0.00" value="100.00">
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <span
                                class="text-slate-400 font-medium bg-slate-800 px-2 py-1 rounded-md text-sm border border-slate-700">USD</span>
                        </div>
                    </div>
                </div>

                <!-- Decorative Swap Icon -->
                <div class="flex justify-center -my-2 relative z-20">
                    <div class="bg-primary text-white p-2 rounded-full shadow-lg border-4 border-slate-800/50 transform transition-transform hover:rotate-180 duration-500 cursor-pointer"
                        id="swap-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
                        </svg>
                    </div>
                </div>

                <!-- INR Display -->
                <div class="group">
                    <label for="inr-display"
                        class="block text-xs font-semibold tracking-wide text-slate-400 uppercase mb-2 ml-1">They
                        Receive (INR)</label>
                    <div class="relative flex items-center">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="text-slate-400 font-semibold sm:text-lg">₹</span>
                        </div>
                        <input type="text" id="inr-display"
                            class="block w-full pl-10 pr-16 py-4 bg-slate-800/30 border border-slate-700/50 rounded-2xl text-emerald-400 font-semibold text-lg cursor-not-allowed outline-none"
                            placeholder="0.00" readonly>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <span
                                class="text-slate-400 font-medium bg-slate-800 px-2 py-1 rounded-md text-sm border border-slate-700">INR</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Convert Button -->
            <button id="convert-btn"
                class="w-full mt-8 bg-gradient-to-r from-primary to-indigo-500 hover:from-indigo-500 hover:to-primary text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-primary/30 transform transition-all duration-300 hover:-translate-y-1 hover:shadow-primary/50 focus:outline-none focus:ring-4 focus:ring-primary/50 active:translate-y-0 flex justify-center items-center gap-2">
                <span>Convert Funds</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z"
                        clip-rule="evenodd" />
                </svg>
            </button>

            <!-- Footer Details -->
            <div class="mt-6 flex flex-col items-center justify-center space-y-1 border-t border-slate-700/50 pt-5">
                <div
                    class="flex items-center text-sm text-slate-300 font-medium bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 text-emerald-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                    1 USD = <span id="rate-display" class="ml-1 text-white font-bold">83.50</span> INR
                </div>
                <p class="text-xs text-slate-500 flex items-center mt-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-1" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Last updated: <span id="time-display" class="ml-1">Just now</span>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const usdInput = document.getElementById('usd-input');
            const inrDisplay = document.getElementById('inr-display');
            const convertBtn = document.getElementById('convert-btn');
            const rateDisplay = document.getElementById('rate-display');
            const timeDisplay = document.getElementById('time-display');

            // Mock exchange rate
            const EXCHANGE_RATE = 83.50;
            rateDisplay.textContent = EXCHANGE_RATE.toFixed(2);

            // Set initial mock time
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + ' ' + now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            const convertCurrency = () => {
                const usdValue = parseFloat(usdInput.value);

                // Add a small loading animation effect to the button
                const originalText = convertBtn.innerHTML;
                convertBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processing...`;
                convertBtn.disabled = true;
                convertBtn.classList.add('opacity-80', 'cursor-not-allowed');

                // Simulate network request delay for realism
                setTimeout(() => {
                    if (isNaN(usdValue) || usdValue < 0) {
                        inrDisplay.value = 'Invalid input';
                        inrDisplay.classList.remove('text-emerald-400');
                        inrDisplay.classList.add('text-red-400');
                    } else {
                        const inrValue = (usdValue * EXCHANGE_RATE).toFixed(2);
                        // Formatting with commas for readability
                        inrDisplay.value = new Intl.NumberFormat('en-IN', { maximumFractionDigits: 2 }).format(inrValue);
                        inrDisplay.classList.remove('text-red-400');
                        inrDisplay.classList.add('text-emerald-400');
                    }

                    // Reset button
                    convertBtn.innerHTML = originalText;
                    convertBtn.disabled = false;
                    convertBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                }, 600);
            };

            // Calculate initial value on load
            convertCurrency();

            // Event Listeners
            convertBtn.addEventListener('click', convertCurrency);

            // Convert on enter key press in input
            usdInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    convertCurrency();
                }
            });

            // Swap icon animation only (doesn't actually swap currencies since INR is read-only per requirements)
            const swapIcon = document.getElementById('swap-icon');
            swapIcon.addEventListener('click', () => {
                swapIcon.style.transform = `rotate(${Math.random() > 0.5 ? 180 : -180}deg)`;
                setTimeout(() => {
                    swapIcon.style.transition = 'none';
                    swapIcon.style.transform = 'rotate(0deg)';
                    setTimeout(() => {
                        swapIcon.style.transition = 'transform 0.5s ease';
                    }, 50);
                }, 500);
            });
        });
    </script>
</body>

</html>
